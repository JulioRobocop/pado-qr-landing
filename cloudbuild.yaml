steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/pado-developer-401613/cloud-run-source-deploy/pado-qr-landing:$COMMIT_SHA'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/pado-developer-401613/cloud-run-source-deploy/pado-qr-landing:$COMMIT_SHA'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pado-qr-landing'
      - '--image=us-central1-docker.pkg.dev/pado-developer-401613/cloud-run-source-deploy/pado-qr-landing:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

images:
  - 'us-central1-docker.pkg.dev/pado-developer-401613/cloud-run-source-deploy/pado-qr-landing:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY